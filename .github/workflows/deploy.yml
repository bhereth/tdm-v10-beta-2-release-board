name: CI and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Only one Pages deployment at a time; never cancel one mid-flight.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  deploy:
    name: Deploy to GitHub Pages
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # next.config.mjs reads GITHUB_ACTIONS/GITHUB_REPOSITORY (both set
      # automatically here) to prefix the build with the repo's Pages path.
      - name: Build static site
        run: npm run build

      # GitHub Pages runs static output through Jekyll by default, which
      # ignores files/folders starting with "_" — including Next's
      # `_next/` asset directory. This file disables that.
      - name: Disable Jekyll processing
        run: touch out/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
